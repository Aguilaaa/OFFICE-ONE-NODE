<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | OfficeOne Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      OfficeOne
      <span>Office Supplies & Furniture</span>
    </a>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="cart-badge">0</span></a>
      <span id="nav-admin" style="display:none"><a href="admin/dashboard.html"><i class="fas fa-cog"></i> Admin</a></span>
      <span id="nav-auth"></span>
    </div>
  </nav>

  <div class="cart-wrap">
    <h1 class="mb-4"><i class="fas fa-shopping-cart"></i> Shopping Cart</h1>

    <div id="cart-empty" class="cart-empty d-none">
      <i class="fas fa-shopping-basket"></i>
      <p>Your cart is empty.</p>
      <a href="index.html" class="btn btn-primary">Continue Shopping</a>
    </div>

    <div id="cart-summary" class="d-none">
      <div class="cart-items-card">
        <div id="cart-items"></div>
      </div>
      <div class="cart-totals-card">
        <h3>Order Summary</h3>
        <div class="cart-total-row">
          <span>Subtotal</span>
          <span id="cart-subtotal">PHP 0.00</span>
        </div>
        <div class="cart-total-row cart-total-final">
          <span>Total</span>
          <span id="cart-total">PHP 0.00</span>
        </div>
        <button type="button" id="btn-checkout" class="btn btn-primary btn-block mt-3">
          <i class="fas fa-credit-card"></i> Proceed to Checkout
        </button>
        <button type="button" id="btn-clear-cart" class="btn btn-outline-secondary btn-block mt-2">Clear Cart</button>
        <a href="index.html" class="btn btn-link btn-block mt-2">Continue Shopping</a>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>
  <script src="js/main-photo.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
