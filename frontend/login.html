<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | OfficeOne Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">OfficeOne<span>Office Supplies & Furniture</span></a>
    <div class="nav-links"><a href="register.html">Register</a></div>
  </nav>

  <div class="form-wrap">
    <h2 class="form-title"><i class="fas fa-sign-in-alt"></i> Login</h2>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-control" placeholder="admin@officeone.com">
        <span id="email-error" class="error-msg">Email is required</span>
        <span id="email-format-error" class="error-msg">Invalid email format</span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Password">
        <span id="password-error" class="error-msg">Password is required</span>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
