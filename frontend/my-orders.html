<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | OfficeOne Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">OfficeOne</a>
    <div class="nav-links">
      <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="cart-badge" style="display:none">0</span></a>
      <span id="nav-admin" style="display:none"><a href="admin/dashboard.html"><i class="fas fa-cog"></i> Admin</a></span>
      <div id="nav-auth"></div>
    </div>
  </nav>

  <div class="orders-page-wrap">
    <h1><i class="fas fa-box-open"></i> My Orders</h1>
    <p class="orders-subtitle">Track your orders and see how they are being processed.</p>

    <div id="orders-loading" class="text-center py-5 text-muted">
      <i class="fas fa-spinner fa-spin"></i> Loading your orders...
    </div>

    <div id="orders-empty" class="orders-empty d-none">
      <i class="fas fa-shopping-bag"></i>
      <p>You have not placed any orders yet.</p>
      <a href="index.html" class="btn btn-primary">Start Shopping</a>
    </div>

    <div id="orders-list" class="orders-list"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>
  <script src="js/my-orders.js"></script>
</body>
</html>
