<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers (MP2) | OfficeOne Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><i class="fas fa-building"></i> OfficeOne Admin</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Products (MP1)</a>
        <a href="customers.html" class="active">Customers (MP2)</a>
        <a href="categories.html">Categories</a>
        <a href="transactions.html">Orders</a>
        <a href="users.html">Users</a>
        <a href="../index.html">Back to Site</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Customers (MP2)</h2>
        <div>
          <button id="btn-trash" type="button" class="btn btn-outline-secondary mr-2"><i class="fas fa-trash-restore"></i> Show Deleted</button>
          <button id="btn-add" class="btn btn-primary"><i class="fas fa-plus"></i> Add Customer</button>
        </div>
      </div>
      <div class="card"><div class="card-body">
        <table id="customers-table" class="table table-striped table-bordered" style="width:100%">
          <thead>
            <tr><th>ID</th><th>Code</th><th>Name</th><th>Contact</th><th>Email</th><th>Status</th><th>Actions</th></tr>
          </thead>
        </table>
      </div></div>
    </main>
  </div>

  <div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="customer-form">
          <div class="modal-header"><h5 class="modal-title">Add Customer</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
          <div class="modal-body">
            <input type="hidden" id="customer-id">
            <div class="form-group"><label>Customer Code *</label><input id="customer_code" class="form-control"><span id="customer_code-error" class="error-msg">Required</span></div>
            <div class="form-group"><label>Name *</label><input id="name" class="form-control"><span id="name-error" class="error-msg">Required</span></div>
            <div class="form-group"><label>Contact No. *</label><input id="contact_no" class="form-control"><span id="contact_no-error" class="error-msg">Required</span></div>
            <div class="form-group"><label>Email</label><input id="email" type="email" class="form-control"></div>
            <div class="form-group"><label>Address</label><textarea id="address" class="form-control" rows="2"></textarea></div>
            <div class="form-group"><label>Active</label><select id="is_active" class="form-control"><option value="1">Yes</option><option value="0">No</option></select></div>
          </div>
          <div class="modal-footer"><button type="submit" class="btn btn-primary">Save</button></div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
  <script src="../js/trash-admin.js"></script>
  <script src="../js/customers.js"></script>
</body>
</html>
