<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | OfficeOne Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand"><i class="fas fa-building"></i> OfficeOne Admin</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="products.html">Products (MP1)</a>
        <a href="categories.html">Categories</a>
        <a href="transactions.html">Orders</a>
        <a href="users.html">Users</a>
        <a href="../index.html">Back to Site</a>
      </nav>
    </aside>
    <main class="main-content">
      <h2 class="mb-4">Dashboard</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="stat-products">-</div><div class="stat-label">Products</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-customers">-</div><div class="stat-label">Customers</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-users">-</div><div class="stat-label">Users</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-transactions">-</div><div class="stat-label">Transactions</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-revenue">-</div><div class="stat-label">Total Revenue</div></div>
      </div>
      <div class="chart-row">
        <div class="chart-card"><canvas id="barChart"></canvas></div>
        <div class="chart-card"><canvas id="lineChart"></canvas></div>
        <div class="chart-card"><canvas id="pieChart"></canvas></div>
      </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
