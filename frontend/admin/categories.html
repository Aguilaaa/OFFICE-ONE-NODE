<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories | OfficeOne Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">OfficeOne Admin</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Products (MP1)</a>
        <a href="categories.html" class="active">Categories</a>
        <a href="transactions.html">Orders</a>
        <a href="users.html">Users</a>
        <a href="../index.html">Back to Site</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Categories</h2>
        <div>
          <button id="btn-trash" type="button" class="btn btn-outline-secondary mr-2"><i class="fas fa-trash-restore"></i> Show Deleted</button>
          <button id="btn-add" class="btn btn-primary">Add Category</button>
        </div>
      </div>
      <div class="card"><div class="card-body">
        <table id="categories-table" class="table table-striped table-bordered" style="width:100%">
          <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Actions</th></tr></thead>
        </table>
      </div></div>
    </main>
  </div>

  <div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="category-form">
          <div class="modal-header"><h5 class="modal-title">Category</h5><button type="button" class="close" data-dismiss="modal">&times;</button></div>
          <div class="modal-body">
            <input type="hidden" id="category-id">
            <div class="form-group">
              <label>Name *</label>
              <input id="name" class="form-control">
              <span id="name-error" class="error-msg">Required</span>
            </div>
            <div class="form-group">
              <label>Type *</label>
              <select id="type" class="form-control">
                <option value="">Select type</option>
                <option>Product</option>
                <option>Service</option>
                <option>Expense</option>
              </select>
              <span id="type-error" class="error-msg">Required</span>
            </div>
          </div>
          <div class="modal-footer"><button type="submit" class="btn btn-primary">Save</button></div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
  <script src="../js/trash-admin.js"></script>
  <script src="../js/categories.js"></script>
</body>
</html>
