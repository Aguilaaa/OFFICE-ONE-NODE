<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | OfficeOne Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">OfficeOne<span>Office Supplies & Furniture</span></a>
    <div class="nav-links"><a href="login.html">Login</a></div>
  </nav>

  <div class="form-wrap text-center">
    <div id="verify-loading">
      <i class="fas fa-spinner fa-spin fa-2x text-primary"></i>
      <p class="mt-3 text-muted">Verifying your email...</p>
    </div>
    <div id="verify-result" class="d-none">
      <div id="verify-icon" class="mb-3"></div>
      <h2 id="verify-title" class="form-title"></h2>
      <p id="verify-message" class="text-muted"></p>
      <a href="login.html" class="btn btn-primary mt-3">Go to Login</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
  <script src="js/verify-email.js"></script>
</body>
</html>
