<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | OfficeOne Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      OfficeOne
      <span>Office Supplies & Furniture</span>
    </a>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count" class="cart-badge">0</span></a>
      <span id="nav-auth"></span>
    </div>
  </nav>

  <div class="cart-wrap text-center">
    <div class="order-success-card">
      <div class="success-icon"><i class="fas fa-check-circle"></i></div>
      <h1>Order Placed!</h1>
      <p class="text-muted">Thank you for your purchase.</p>
      <div class="order-success-details">
        <p><strong>Order #:</strong> <span id="order-no">-</span></p>
        <p><strong>Total:</strong> <span id="order-total">-</span></p>
      </div>
      <a href="index.html" class="btn btn-primary mt-3">Continue Shopping</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>
  <script>
    $(document).ready(() => {
      const order = JSON.parse(sessionStorage.getItem('lastOrder') || 'null');
      if (!order) {
        window.location.href = 'index.html';
        return;
      }
      $('#order-no').text(order.transaction_no);
      $('#order-total').text(`PHP ${parseFloat(order.grand_total || 0).toFixed(2)}`);
      sessionStorage.removeItem('lastOrder');
    });
  </script>
</body>
</html>
